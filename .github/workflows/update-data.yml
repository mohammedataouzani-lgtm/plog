name: Mise à jour données parlementaires

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Forcer mise à jour complète'
        required: false
        default: 'false'

jobs:
  update:
    name: Mise à jour données
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Installer dépendances Python
        run: pip install requests

      - name: Installer Turso CLI
        run: |
          curl -sSfL https://get.tur.so/install.sh | bash
          echo "$HOME/.turso/bin" >> $GITHUB_PATH

      - name: Mise à jour élus (AN + Sénat)
        run: python scripts/update_elus.py
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Mise à jour scrutins (incrémental)
        run: python scripts/update_scrutins.py
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Calcul stats participation + rebellion
        run: python scripts/compute_stats.py
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Mise a jour activite parlementaire
        run: python scripts/update_activite.py
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Mise a jour archives
        if: github.event.inputs.force_full == 'true'
        run: python scripts/update_archives.py
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
