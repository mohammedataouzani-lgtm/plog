name: Mise à jour données parlementaires

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Forcer mise à jour complète archives'
        required: false
        default: 'false'

jobs:
  update:
    name: Mise à jour données
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Installer dépendances
        run: pip install requests

      - name: Mise à jour élus (AN + Sénat)
        run: python scripts/update_elus.py
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Mise à jour scrutins (incrémental)
        run: python scripts/update_scrutins.py
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Mise à jour archives (hebdomadaire)
        if: github.event.inputs.force_full == 'true'
        run: python scripts/update_archives.py
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
